<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>POS System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous">
  <link rel="stylesheet" href="css/user.css">
</head>

<body>
  <div class="user-page d-flex justify-content-center align-items-center min-vh-100 py-4">
    <div class="custom-modal bg-white position-relative d-flex flex-column">

      <!-- Close Button -->
      <span class="close-btn fw-bold"
        onclick="if(window.parent && window.parent.closeUserManager) window.parent.closeUserManager();">&times;</span>

      <!-- Header -->
      <div class="px-2">
        <h5 class="mb-2 text-dark header-title">User Manager</h5>
        <hr class="mt-0 mb-4 text-secondary">
      </div>

      <!-- Search bar -->
      <div class="mb-4 px-2 search-container">
        <input type="text" class="custom-search form-control w-100" placeholder="Search ...">
      </div>

      <!-- User Details Section -->
      <div class="custom-card mb-4 mx-2">
        <div class="custom-card-header text-white px-3 py-2 fw-semibold">
          User Details
        </div>
        <div class="custom-card-body p-4 bg-white">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label text-secondary small mb-1">User ID:</label>
              <input type="text" class="form-control custom-input">
            </div>
            <div class="col-md-4">
              <label class="form-label text-secondary small mb-1">User Name:</label>
              <input type="text" class="form-control custom-input">
            </div>
            <div class="col-md-4">
              <label class="form-label text-secondary small mb-1">Address:</label>
              <input type="text" class="form-control custom-input">
            </div>
          </div>
          <div class="row g-3 mt-1">
            <div class="col-md-4">
              <label class="form-label text-secondary small mb-1">Phone:</label>
              <input type="text" class="form-control custom-input">
            </div>
            <div class="col-md-4">
              <label class="form-label text-secondary small mb-1">Username:</label>
              <input type="text" class="form-control custom-input">
            </div>
            <div class="col-md-4">
              <label class="form-label text-secondary small mb-1">Password:</label>
              <input type="password" class="form-control custom-input">
            </div>
          </div>
          <div class="row g-3 mt-1">
            <div class="col-md-4">
              <label class="form-label text-secondary small mb-1">Role:</label>
              <input type="text" class="form-control custom-input">
            </div>
          </div>
          <div class="d-flex justify-content-end mt-4 gap-2">
            <button class="btn btn-save px-4 text-white custom-btn fw-semibold">Save</button>
            <button class="btn btn-update px-4 text-white custom-btn fw-semibold">Update</button>
            <button class="btn btn-reset px-4 text-white custom-btn fw-semibold">Reset</button>
          </div>
        </div>
      </div>

      <!-- Users Section -->
      <div class="custom-card mx-2 mb-2">
        <div class="custom-card-header text-white px-3 py-2 fw-semibold">
          Users
        </div>
        <div class="custom-card-body p-0">
          <div class="table-responsive bg-white rounded-bottom">
            <table class="table mb-0 custom-table border-0">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Role</th>
                  <th>address</th>
                  <th>Phone</th>
                  <th>Username</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td class="fw-bold">UID-001</td>
                  <td class="fw-bold">John</td>
                  <td class="fw-bold">Admin</td>
                  <td class="fw-bold">Galle</td>
                  <td class="fw-bold">0784561233</td>
                  <td class="fw-bold">user</td>
                  <td><button class="btn btn-sm btn-delete px-3 py-1 custom-btn fw-semibold">Delete</button></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
</body>

</html>
